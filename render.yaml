# Render Blueprint — deploy as a Static Site (CDN), not a Node web service.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: portfolio-frontend
    runtime: static
    plan: free
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache
